# 123000 Tomás Câmara
name: Qodana Long Method

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main, metrics-pdf ]

jobs:
  qodana:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Qodana
        uses: JetBrains/qodana-action@v2025.3
        with:
          use-annotations: true
          args: --linter jetbrains/qodana-jvm-community:2025.3