# 123000 Tomas Camara
name: Qodana Long Method

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  qodana:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Qodana
        uses: JetBrains/qodana-action@v2025.3
        with:
          args: --linter qodana-jvm
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}